<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Private fontconfig configuration for the AppImage build.

  WHY THIS EXISTS: the AppImage bundles libfontconfig (pulled in by libQt6Gui),
  but stock config makes it mmap the HOST's font caches (~/.cache/fontconfig,
  /var/cache/fontconfig). Cache files are raw structs; when the bundled
  fontconfig version disagrees with the host's about the layout, reading the
  host's cache segfaults in FcCharSetHasChar during the first text layout —
  the app "shows the splash then dies". It also poisons the other direction:
  caches WE write can crash host apps. A private <cachedir> keeps the two
  worlds fully separated.

  Deliberately NOT <include>ing /etc/fonts/fonts.conf: it would re-import the
  host's <cachedir> entries and defeat the isolation. Instead we list the
  standard font directories ourselves and include only conf.d (rendering /
  substitution rules — no cachedirs live there on any mainstream distro).

  Wired up by the mod-manager wrapper (PKGBUILD) via FONTCONFIG_FILE, with a
  user override respected.
-->
<fontconfig>
  <!-- Standard system + user font directories (matches what every mainstream
       distro's fonts.conf lists). prefix="xdg" = $XDG_DATA_HOME. -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <dir prefix="xdg">fonts</dir>
  <dir>~/.fonts</dir>

  <!-- App-private cache — NEVER the shared ~/.cache/fontconfig.
       prefix="xdg" = $XDG_CACHE_HOME. -->
  <cachedir prefix="xdg">AmethystModManager/fontconfig</cachedir>

  <!-- Host rendering/substitution rules (antialiasing, hinting, metric
       aliases, emoji fallback) so text looks the same as native apps. -->
  <include ignore_missing="yes">/etc/fonts/conf.d</include>
  <include ignore_missing="yes">/etc/fonts/local.conf</include>
</fontconfig>
