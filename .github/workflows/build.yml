name: Build Artifacts

# Reusable build workflow — called by release.yml (tag publish) and
# test-build.yml (manual test builds). Produces the AppImage and/or
# Flatpak bundle as run artifacts; publishing is the caller's job.
on:
  workflow_call:
    inputs:
      build_appimage:
        description: Build the AppImage
        type: boolean
        default: true
      build_flatpak:
        description: Build the Flatpak bundle
        type: boolean
        default: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # libloot must be built once per target Python ABI:
  #   - Arch container (AppImage): Python 3.14 → cp314 .so
  #   - KDE 6.9 runtime (Flatpak): Python 3.12 → cp312 .so
  #     (freedesktop-sdk 24.08, which KDE 6.9 inherits, ships Python 3.12)
  # Each is cached independently keyed on libloot HEAD + Python version.
  # ────────────────────────────────────────────────────────────────────
  libloot-arch:
    name: libloot (Arch / cp314)
    if: ${{ inputs.build_appimage }}
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    outputs:
      so-name: ${{ steps.detect.outputs.so-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syy --noconfirm
          pacman -S --noconfirm \
              python python-pip base-devel rust git unzip

      - name: Resolve libloot revision and Python ABI
        id: detect
        run: |
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV"  >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"            >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"          >> "$GITHUB_OUTPUT"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - uses: actions/upload-artifact@v4
        with:
          name: libloot-cp314
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  # libloot for Python 3.12 — needed by the Flatpak (KDE 6.9 runtime
  # ships Python 3.12). Built on a plain Ubuntu runner with
  # actions/setup-python because the Flathub container has no usable
  # package manager and the Arch container ships Python 3.14.
  libloot-flatpak:
    name: libloot (KDE 6.9 / cp312)
    if: ${{ inputs.build_flatpak }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve libloot revision
        id: detect
        run: |
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV" >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"           >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"         >> "$GITHUB_OUTPUT"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - uses: actions/upload-artifact@v4
        with:
          name: libloot-cp312
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────
  # AppImage build (quick-sharun in the Arch container).
  # ────────────────────────────────────────────────────────────────────
  appimage:
    name: AppImage
    if: ${{ inputs.build_appimage }}
    needs: libloot-arch
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@v4

      # anylinux-setup-action downloads three helper scripts from
      # raw.githubusercontent.com using `wget --retry-connrefused`, which does
      # NOT retry on HTTP errors — a transient 429 (Too Many Requests) from
      # GitHub's raw host aborts the whole build. Its URLs are env-overridable
      # but its downloader is wget, which rejects file:// URLs ("Unsupported
      # scheme"), so we can't point it at local copies. Instead: fetch the
      # scripts here with a real 429-aware retry loop, install them into
      # /usr/local/bin ourselves, and inline the action's remaining setup
      # (keyring + pacman packages) in the next step.
      - name: Pre-fetch anylinux tools (429-resilient)
        id: anylinux_tools
        shell: bash
        run: |
          set -euo pipefail
          # Ensure a downloader exists before the setup action installs its own.
          if ! command -v curl >/dev/null 2>&1 && ! command -v wget >/dev/null 2>&1; then
            pacman -Sy --noconfirm curl
          fi
          base="https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools"
          dir="$RUNNER_TEMP/anylinux-tools"
          mkdir -p "$dir"
          # Prefer curl; fall back to wget. Neither's built-in --retry acts on
          # HTTP 429 reliably, so drive the retry from the shell loop.
          download() {
            local url="$1" dest="$2"
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL -o "$dest" "$url"
            else
              wget -q -O "$dest" "$url"
            fi
          }
          fetch() {
            local url="$1" dest="$2" attempt
            for attempt in 1 2 3 4 5 6; do
              if download "$url" "$dest"; then
                echo "fetched $url"
                return 0
              fi
              echo "attempt $attempt failed for $url; sleeping..."
              sleep $((attempt * 15))
            done
            echo "ERROR: could not fetch $url after retries" >&2
            return 1
          }
          fetch "$base/quick-sharun.sh"      "$dir/quick-sharun.sh"
          fetch "$base/get-debloated-pkgs.sh" "$dir/get-debloated-pkgs.sh"
          fetch "$base/make-aur-package.sh"   "$dir/make-aur-package.sh"
          install -Dm755 "$dir/quick-sharun.sh"       /usr/local/bin/quick-sharun
          install -Dm755 "$dir/get-debloated-pkgs.sh" /usr/local/bin/get-debloated-pkgs
          install -Dm755 "$dir/make-aur-package.sh"   /usr/local/bin/make-aur-package

      # Inlined from pkgforge-dev/anylinux-setup-action@v2, minus its tool
      # downloads (installed from local copies above).
      - name: Prepare anylinux container
        shell: bash
        run: |
          set -euo pipefail
          pacman-key --init
          pacman -Syy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm \
              7zip \
              base-devel \
              freetype2 \
              git \
              jq \
              libx11 \
              libxrandr \
              libxss \
              nspr \
              nss \
              nss-mdns \
              nss-myhostname \
              patchelf \
              pulseaudio \
              pulseaudio-alsa \
              unzip \
              wget \
              xorg-server-xvfb \
              zsync

      - name: Install build dependencies
        run: |
          # pyside6: the Qt GUI — installed as a system package (not pip)
          # so quick-sharun traces the shared Qt libs and deploys their
          # plugins. qt6-wayland: explicit because pyside6 doesn't hard-
          # depend on it and quick-sharun only deploys wayland plugin dirs
          # that exist on disk.
          # qt6-imageformats: provides the extra image-format plugins that
          # qt6-base omits — critically libqwebp.so. Nexus Mods serves its
          # mod/collection thumbnails as WebP, so without this plugin
          # QImage.fromData() returns null and the browser cards render
          # blank. quick-sharun only deploys imageformats/*.so that exist
          # on disk, so the plugin must be installed here to be bundled.
          # libarchive: bsdtar + libarchive.so.13 for fast extraction.
          # sudo: needed for `sudo -u builder` makepkg invocation.
          # (base-devel is already pulled in by the container-prep step.)
          # zenity is bundled from zenity-rs-bin (static) by the PKGBUILD;
          # not installed here.
          pacman -Syu --noconfirm \
              pyside6 \
              qt6-wayland \
              qt6-imageformats \
              python-pip \
              libarchive \
              wget \
              sudo

      - name: Install debloated packages
        run: |
          # icu-mini: ICU is qt6-base's largest dependency; libxml2-mini:
          # small, still a transitive dep. qt6-base-mini: debloated qt6-base
          # (provides/replaces the full package pyside6 pulled in above) —
          # same variant upstream pkgforge Qt AppImages ship.
          get-debloated-pkgs \
              icu-mini \
              libxml2-mini \
              qt6-base-mini

      - name: Create makepkg build user
        run: |
          # makepkg refuses to run as root. The container is root by
          # default, so create a user the script can sudo to.
          if ! id builder >/dev/null 2>&1; then
              useradd -m -G wheel builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
              chmod 0440 /etc/sudoers.d/builder
          fi

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-cp314
          path: src/LOOT/

      - name: Disk space before build
        run: df -h && du -sh /tmp 2>/dev/null || true

      - name: Build AppImage
        run: bash src/appimage/make-appimage.sh

      - name: Disk space after build
        if: always()
        run: df -h && du -sh /tmp/amethyst-mm-build 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: src/appimage/dist/*
          if-no-files-found: error

      - name: Smoke test AppImage
        run: quick-sharun --test src/appimage/dist/*.AppImage

  # ────────────────────────────────────────────────────────────────────
  # Flatpak bundle (KDE 6.9 runtime + PySide BaseApp).
  # Pulls the cp312 libloot from libloot-flatpak, drops it into src/LOOT/
  # so the manifest's `cp -a src/LOOT` step picks it up.
  # ────────────────────────────────────────────────────────────────────
  flatpak:
    name: Flatpak
    if: ${{ inputs.build_flatpak }}
    needs: libloot-flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.9
      options: --privileged
    env:
      # Callers must pass `secrets: inherit` for these to be non-empty.
      # secrets.* is not allowed in step-level `if:`, so surface a flag here.
      HAVE_GPG: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-cp312
          path: src/LOOT/

      # Sign the export commits at BUILD time (the action passes --gpg-sign to
      # flatpak-builder). Without this the bundle's commit is unsigned, and a
      # bundle that embeds --gpg-keys then FAILS to install ("GPG verification
      # enabled, but no signatures found") — verification is all-or-nothing.
      - name: Import GPG signing key
        if: env.HAVE_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys "$GPG_KEY_ID" >/dev/null

      # Decide the OSTree branch this build publishes to. Tag pushes of the
      # form vX.Y.Z-... (a hyphen ⇒ prerelease) go to `beta`; everything else
      # (stable tags, manual test builds) goes to `stable`. This lets the
      # hosted remote carry both channels natively — no tag parsing in the app.
      - name: Resolve flatpak branch
        id: branch
        shell: bash
        run: |
          ref='${{ github.ref_name }}'
          if [[ "$ref" == v*-* ]]; then
            echo "name=beta" >> "$GITHUB_OUTPUT"
          else
            echo "name=stable" >> "$GITHUB_OUTPUT"
          fi

      # Build via the flathub action (it registers the flathub remote, handles
      # the container quirks, and caches the builder). We use its native inputs
      # to (a) stamp the OSTree branch (stable/beta) and (b) keep the exported
      # repo/ dir — so we no longer hand-roll flatpak-builder and re-introduce
      # the "No remote refs found for flathub" failure. The bundle is built in
      # the next step instead (the action doesn't expose --repo-url).
      - name: Build Flatpak (repo)
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          manifest-path: flatpak/io.github.Amethyst.ModManager.yml
          branch: ${{ steps.branch.outputs.name }}
          build-bundle: false
          repo-dir: repo
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false
          # Empty when secrets aren't inherited → the action skips signing.
          gpg-sign: ${{ secrets.FLATPAK_GPG_KEY_ID }}

      # Bundle with --repo-url: installing the .flatpak then auto-configures
      # the hosted remote as the app's origin, so bundle users get native
      # `flatpak update` / Discover updates from day one (no enroll button).
      # --gpg-keys embeds the public signing key so install + future updates
      # are signature-verified — but ONLY when this build actually signed its
      # commits (embedding a key while the commit is unsigned makes the bundle
      # UNINSTALLABLE: "GPG verification enabled, but no signatures found").
      - name: Bundle (auto-enrolling remote)
        env:
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail
          GPGOPT=""
          if [ "$HAVE_GPG" = "true" ]; then
            gpg --export "$GPG_KEY_ID" > amethyst.gpg
            GPGOPT="--gpg-keys=amethyst.gpg"
          else
            echo "Unsigned build — bundle will not embed a verification key."
          fi
          flatpak build-bundle repo AmethystModManager.flatpak \
            io.github.Amethyst.ModManager '${{ steps.branch.outputs.name }}' \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
            --repo-url=https://chrisdkn.github.io/Amethyst-Mod-Manager/repo/ \
            $GPGOPT

      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-flatpak
          path: AmethystModManager.flatpak
          if-no-files-found: error

      # The raw OSTree repo for this build — consumed by release.yml's
      # publish-pages job, which merges it into the accumulated gh-pages repo.
      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-flatpak-repo
          path: repo/
          if-no-files-found: error
