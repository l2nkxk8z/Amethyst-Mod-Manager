name: Build Release Artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

# Required for the release-publish step (softprops/action-gh-release).
permissions:
  contents: write

jobs:
  # Build both artifacts via the shared reusable workflow (also used by
  # test-build.yml for manual test builds).
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      build_appimage: true
      build_flatpak: true

  # ────────────────────────────────────────────────────────────────────
  # Publish a GitHub Release with the AppImage and Flatpak bundle.
  # Runs only on tag pushes — workflow_dispatch runs still upload
  # artifacts to the run page but skip this job.
  # ────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    if: |
      startsWith(github.ref, 'refs/tags/v')
      && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: artifacts/
      - name: Download Flatpak
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-flatpak
          path: artifacts/

      # Extract the section for this version from Changelog.txt.
      # For prereleases (v1.3.0-beta.2) we look up the base stable version
      # (v1.3.0). If no matching section is found we fall back to GitHub's
      # auto-generated notes by leaving release-notes.md absent.
      #
      # Stable releases get wrapped in a "What's Changed" header plus an
      # install command footer. Prereleases get the raw bullet list only.
      - name: Extract changelog section
        id: changelog
        run: |
          tag='${{ github.ref_name }}'
          base="${tag%%-*}"
          is_prerelease=''
          if [ "$tag" != "$base" ]; then
            is_prerelease='1'
          fi
          awk -v v="- $base" '
            $0 == v { capture = 1; next }
            capture && /^- v[0-9]/ { exit }
            capture { print }
          ' Changelog.txt | sed -e :a -e '/^$/{$d;N;ba' -e '}' > raw-notes.md
          if [ ! -s raw-notes.md ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No changelog entry for $base; falling back to auto-generated notes"
            rm -f raw-notes.md release-notes.md
            exit 0
          fi
          if [ -n "$is_prerelease" ]; then
            mv raw-notes.md release-notes.md
          else
            {
              echo "## Whats Changed"
              echo
              # Convert "- text" lines into markdown bullets. The changelog
              # already uses "- " as a bullet marker, so just pass through.
              cat raw-notes.md
              echo
              echo "##"
              echo
              echo "Run the following command to install/Update. Or download the appimage directly."
              echo
              echo '```bash'
              echo 'curl -sSL https://raw.githubusercontent.com/ChrisDKN/Amethyst-Mod-Manager/main/src/appimage/Amethyst-MM-installer.sh | bash'
              echo '```'
            } > release-notes.md
            rm -f raw-notes.md
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat release-notes.md

      # When publishing a new beta, remove older prereleases (and their
      # tags) so only the latest beta is visible on the releases page.
      # Each beta keeps its own unique tag at publish time — the auto
      # updater only needs the new tag to exist.
      - name: Delete previous beta releases
        if: contains(github.ref_name, '-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 50 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | select(.tagName != "${{ github.ref_name }}") | .tagName' \
          | while read -r tag; do
              echo "Deleting prerelease $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          fail_on_unmatched_files: true
