name: Build Release Artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run_pages:
        description: >-
          Test the Flatpak-remote publish end-to-end WITHOUT cutting a release.
          Publishes to the gh-pages-dryrun branch (never touches gh-pages) so
          you can verify the OSTree repo builds and serves. No GitHub Release
          is created.
        type: boolean
        default: false
      publish_live_channel:
        description: >-
          Publish this build to the LIVE remote (gh-pages) on the chosen
          channel WITHOUT creating a GitHub Release — for rehearsing a stable
          release against real clients before tagging. Only remote-enrolled
          installs see it; GitHub-release update paths are untouched. Undo
          with the Rollback workflow. Ignored when dry_run_pages is set.
        type: choice
        options: [none, stable, beta]
        default: none

# Required for the release-publish step (softprops/action-gh-release) and the
# publish-pages step (which pushes the OSTree repo to the gh-pages branch).
permissions:
  contents: write

jobs:
  # Build both artifacts via the shared reusable workflow (also used by
  # test-build.yml for manual test builds).
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    # Passes the FLATPAK_GPG_* secrets through so the flatpak job can sign its
    # export commits (required for the bundle's embedded --gpg-keys to verify).
    secrets: inherit
    with:
      # A Pages dry-run only needs the Flatpak repo artifact — skip the
      # AppImage build to save CI time. Real runs build both.
      build_appimage: ${{ !inputs.dry_run_pages }}
      build_flatpak: true
      # Live-channel rehearsals must stamp the requested OSTree branch (a
      # dispatch ref is a branch name, so tag-derivation would pick stable
      # regardless). Empty for tag pushes / dry-runs → tag-derived / stable.
      flatpak_channel: ${{ (!inputs.dry_run_pages && inputs.publish_live_channel != 'none' && inputs.publish_live_channel) || '' }}

  # ────────────────────────────────────────────────────────────────────
  # Publish a GitHub Release with the AppImage and Flatpak bundle.
  # Runs only on tag pushes — workflow_dispatch runs still upload
  # artifacts to the run page but skip this job.
  # ────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    if: |
      startsWith(github.ref, 'refs/tags/v')
      && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: artifacts/
      - name: Download Flatpak
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-flatpak
          path: artifacts/

      # Extract the section for this version from Changelog.txt.
      # For prereleases (v1.3.0-beta.2) we look up the base stable version
      # (v1.3.0). If no matching section is found we fall back to GitHub's
      # auto-generated notes by leaving release-notes.md absent.
      #
      # Stable releases get wrapped in a "What's Changed" header plus an
      # install command footer. Prereleases get the raw bullet list only.
      - name: Extract changelog section
        id: changelog
        run: |
          tag='${{ github.ref_name }}'
          base="${tag%%-*}"
          is_prerelease=''
          if [ "$tag" != "$base" ]; then
            is_prerelease='1'
          fi
          awk -v v="- $base" '
            $0 == v { capture = 1; next }
            capture && /^- v[0-9]/ { exit }
            capture { print }
          ' Changelog.txt | sed -e :a -e '/^$/{$d;N;ba' -e '}' > raw-notes.md
          if [ ! -s raw-notes.md ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No changelog entry for $base; falling back to auto-generated notes"
            rm -f raw-notes.md release-notes.md
            exit 0
          fi
          if [ -n "$is_prerelease" ]; then
            mv raw-notes.md release-notes.md
          else
            {
              echo "## Whats Changed"
              echo
              # Convert "- text" lines into markdown bullets. The changelog
              # already uses "- " as a bullet marker, so just pass through.
              cat raw-notes.md
              echo
              echo "##"
              echo
              echo "Run the following command to install/Update. Or download the appimage directly."
              echo
              echo '```bash'
              echo 'curl -sSL https://raw.githubusercontent.com/ChrisDKN/Amethyst-Mod-Manager/main/src/appimage/Amethyst-MM-installer.sh | bash'
              echo '```'
            } > release-notes.md
            rm -f raw-notes.md
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat release-notes.md

      # When publishing a new beta, remove older prereleases (and their
      # tags) so only the latest beta is visible on the releases page.
      # Each beta keeps its own unique tag at publish time — the auto
      # updater only needs the new tag to exist.
      - name: Delete previous beta releases
        if: contains(github.ref_name, '-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 50 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | select(.tagName != "${{ github.ref_name }}") | .tagName' \
          | while read -r tag; do
              echo "Deleting prerelease $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          fail_on_unmatched_files: true

  # ────────────────────────────────────────────────────────────────────
  # Publish the OSTree repo to GitHub Pages (the hosted Flatpak remote).
  #
  # The gh-pages branch holds the ACCUMULATED repo across all releases —
  # OSTree is incremental, so we must merge this build's objects into the
  # existing repo (never rebuild from scratch) to keep delta updates working.
  #
  # Flow:
  #   1. checkout gh-pages (the live repo) into ./site (empty on first run)
  #   2. pull this build's freshly-exported repo artifact into ./newrepo
  #   3. flatpak build-commit-from: copy newrepo's ref into site/repo
  #   4. regenerate summary + static deltas so clients get delta updates
  #   5. drop the .flatpakrepo enrolment file at the Pages root
  #   6. commit & push gh-pages
  #
  # Signing: if a GPG key is configured (secrets.FLATPAK_GPG_PRIVATE_KEY +
  # FLATPAK_GPG_KEY_ID), commits and the summary are signed and the public
  # key is embedded in the .flatpakrepo. Without it, the repo is unsigned
  # (still works; clients add the remote with --no-gpg-verify).
  # ────────────────────────────────────────────────────────────────────
  publish-pages:
    name: Publish Flatpak remote (GitHub Pages)
    # Runs on tag pushes (real publish), a dry-run dispatch (isolated
    # gh-pages-dryrun branch), or a live-channel rehearsal dispatch (live
    # remote, no GitHub Release).
    if: |
      needs.build.result == 'success'
      && (startsWith(github.ref, 'refs/tags/v')
          || inputs.dry_run_pages
          || inputs.publish_live_channel != 'none')
    needs: build
    runs-on: ubuntu-latest
    env:
      PAGES_URL: https://chrisdkn.github.io/Amethyst-Mod-Manager
      APP_ID: io.github.Amethyst.ModManager
      # `secrets.*` is NOT allowed in a step-level `if:`, but it IS allowed in a
      # job-level env. Surface a plain flag here so steps can gate on env.HAVE_GPG.
      HAVE_GPG: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY != '' }}
    steps:
      - name: Install flatpak + ostree
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree

      # Resolve BOTH the OSTree branch (stable/beta) and the git branch the
      # Pages repo lives on. A dry-run forces the `stable` OSTree branch (no
      # tag to parse) and targets gh-pages-dryrun so the real remote is safe.
      # A live-channel rehearsal targets the LIVE gh-pages on the chosen
      # channel (the GitHub Release job stays tag-gated regardless).
      - name: Resolve mode
        id: mode
        run: |
          LIVE='${{ inputs.publish_live_channel }}'
          if [ "${{ inputs.dry_run_pages }}" = "true" ]; then
            echo "ostree=stable"       >> "$GITHUB_OUTPUT"
            echo "git_branch=gh-pages-dryrun" >> "$GITHUB_OUTPUT"
            echo "dry=true"            >> "$GITHUB_OUTPUT"
          elif [ -n "$LIVE" ] && [ "$LIVE" != "none" ]; then
            echo "ostree=$LIVE"        >> "$GITHUB_OUTPUT"
            echo "git_branch=gh-pages" >> "$GITHUB_OUTPUT"
            echo "dry=false"           >> "$GITHUB_OUTPUT"
          else
            ref='${{ github.ref_name }}'
            if [[ "$ref" == v*-* ]]; then
              echo "ostree=beta"   >> "$GITHUB_OUTPUT"
            else
              echo "ostree=stable" >> "$GITHUB_OUTPUT"
            fi
            echo "git_branch=gh-pages" >> "$GITHUB_OUTPUT"
            echo "dry=false"          >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Pages branch (live repo)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.mode.outputs.git_branch }}
          path: site
        continue-on-error: true

      - name: Ensure site skeleton
        run: |
          mkdir -p site/repo
          # First-ever run: initialise an archive-z2 OSTree repo (the format
          # served over plain HTTPS).
          if [ ! -d site/repo/objects ]; then
            ostree --repo=site/repo init --mode=archive-z2
          fi
          # Git does NOT store empty directories, so checking out gh-pages
          # loses the empty parts of the OSTree layout (refs/remotes,
          # refs/mirrors, state, tmp). ostree then dies with
          # "opendir(refs/remotes): No such file or directory" on the second
          # publish. Recreate them unconditionally — mkdir -p is idempotent.
          mkdir -p site/repo/objects \
                   site/repo/refs/heads site/repo/refs/mirrors \
                   site/repo/refs/remotes site/repo/state \
                   site/repo/extensions site/repo/tmp/cache

      - name: Download this build's repo
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-flatpak-repo
          path: newrepo

      - name: Import GPG signing key
        id: gpg
        if: env.HAVE_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          # Pipe the (multi-line, armored) key from an env var, NOT inline
          # interpolation, so newlines survive intact.
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Confirm the signing key is actually present before we rely on it —
          # a silent import failure would otherwise ship an UNSIGNED repo.
          gpg --list-secret-keys "$GPG_KEY_ID" >/dev/null
          echo "sign=--gpg-sign=${GPG_KEY_ID}" >> "$GITHUB_OUTPUT"

      - name: Merge build into live repo
        run: |
          set -euo pipefail
          BRANCH='${{ steps.mode.outputs.ostree }}'
          SIGN='${{ steps.gpg.outputs.sign }}'
          REF="app/${APP_ID}/x86_64/${BRANCH}"
          # Commit subject = the version. Warehouse's "Change Version" picker
          # (and `ostree log`) shows subject + hash + date per commit — the
          # default "Export <app-id>" subject tells users nothing.
          if [ '${{ steps.mode.outputs.dry }}' = 'true' ]; then
            SUBJECT="dry-run ${GITHUB_SHA:0:7}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            SUBJECT="${GITHUB_REF_NAME#v}"
          else
            # Live-channel rehearsal: no tag, so the ref name is a branch —
            # read the app version out of the built commit itself instead.
            SRC=$(ostree --repo=newrepo rev-parse "$REF")
            SUBJECT=$(ostree --repo=newrepo cat "$SRC" \
                        /files/share/amethyst-mod-manager/version.py 2>/dev/null \
                      | grep -oE '"[^"]+"' | head -1 | tr -d '"' || true)
            SUBJECT="${SUBJECT:-${GITHUB_REF_NAME}}"
          fi
          # Copy the app ref (and its runtime refs are pulled by clients from
          # flathub, so only the app ref needs to live here) into the live repo.
          flatpak build-commit-from \
            --src-repo=newrepo \
            --subject="$SUBJECT" \
            $SIGN \
            site/repo "$REF"
          # Regenerate summary + static deltas so clients fetch deltas, not
          # full trees, on update.
          flatpak build-update-repo \
            --generate-static-deltas \
            --prune --prune-depth=20 \
            $SIGN \
            site/repo

      - name: Export public key + .flatpakrepo + .flatpakref
        env:
          # HAVE_GPG comes from the job-level env (can't reference secrets in
          # a step `if:`, but the run body reads the inherited env var fine).
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          GPGLINE=""
          if [ "$HAVE_GPG" = "true" ]; then
            gpg --export "$GPG_KEY_ID" > site/amethyst.gpg
            B64=$(base64 -w0 site/amethyst.gpg)
            GPGLINE="GPGKey=${B64}"
          fi
          cat > site/amethyst.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=Amethyst Mod Manager
          Url=${PAGES_URL}/repo/
          Homepage=https://github.com/ChrisDKN/Amethyst-Mod-Manager
          Comment=Auto-update remote for Amethyst Mod Manager (stable + beta)
          Description=Adds the Amethyst Mod Manager Flatpak remote so updates arrive via your package manager.
          Icon=${PAGES_URL}/icon.png
          ${GPGLINE}
          EOF
          # One-command install files: `flatpak install --user <url>.flatpakref`
          # adds the remote (GPG key embedded) AND installs the app — no
          # separate remote-add. Also double-clickable in GNOME Software /
          # Discover. One file per branch, written only when that branch
          # actually exists in the repo (a ref file pointing at a missing
          # branch would just error at install time).
          for BR in stable beta; do
            if ostree --repo=site/repo refs | grep -qx "app/${APP_ID}/x86_64/${BR}"; then
              SUFFIX=""; [ "$BR" = "beta" ] && SUFFIX="-beta"
              cat > "site/amethyst${SUFFIX}.flatpakref" <<EOF
          [Flatpak Ref]
          Name=${APP_ID}
          Branch=${BR}
          Title=Amethyst Mod Manager (${BR})
          Url=${PAGES_URL}/repo/
          SuggestRemoteName=amethyst
          Homepage=https://github.com/ChrisDKN/Amethyst-Mod-Manager
          Icon=${PAGES_URL}/icon.png
          IsRuntime=false
          RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo
          ${GPGLINE}
          EOF
            fi
          done
          # A .nojekyll file keeps GitHub Pages from mangling the OSTree object
          # dirs (which start with characters Jekyll would try to process).
          touch site/.nojekyll

      # Sanity-check the repo locally before pushing: pull the just-committed
      # ref into a throwaway repo. If OSTree can't read it back, the publish is
      # broken regardless of what Pages later serves — fail loudly here.
      - name: Verify repo integrity
        run: |
          set -euo pipefail
          BRANCH='${{ steps.mode.outputs.ostree }}'
          REF="app/${APP_ID}/x86_64/${BRANCH}"
          ostree --repo=site/repo summary --view | head -40
          ostree --repo=site/repo refs | grep -F "$REF"
          ostree --repo=site/repo fsck --quiet
          echo "OSTree repo OK — ref $REF present and fsck clean."

      - name: Push Pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GIT_BRANCH='${{ steps.mode.outputs.git_branch }}'
          cd site
          # `site/` may already be a git repo (actions/checkout initialised it,
          # even when it fell back on a non-existent branch) or may be a bare
          # skeleton (first-ever run). `git init` is idempotent; use set-url
          # (add-if-missing) for origin so we never hit "remote already exists".
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url origin "$REMOTE_URL" 2>/dev/null \
            || git remote add origin "$REMOTE_URL"
          git add -A
          git commit -q -m "Publish ${{ github.ref_name }} (${{ steps.mode.outputs.ostree }})"
          # Force-push a single-commit history: the repo can get large, and we
          # don't need Pages-branch history (the OSTree repo carries its own).
          # HEAD:branch avoids `git branch -M` renaming a checked-out ref.
          git push -f origin "HEAD:refs/heads/${GIT_BRANCH}"

      - name: Summary
        run: |
          {
            if [ '${{ steps.mode.outputs.dry }}' = 'true' ]; then
              echo "### 🧪 Flatpak remote DRY RUN"
              echo ""
              echo "Published to branch \`gh-pages-dryrun\` — the live \`gh-pages\` remote was **not** touched."
              echo ""
              echo "**Verified:** OSTree repo builds, merges the app ref, regenerates summary + deltas, fsck-clean, and pushes successfully."
              echo ""
              echo "**Not verified by a dry run:** HTTPS serving. GitHub Pages serves only the one branch you select in Settings → Pages (normally \`gh-pages\`), so \`gh-pages-dryrun\` isn't served unless you point Pages at it temporarily. To test end-to-end serving, either select \`gh-pages-dryrun\` in Pages settings, or just cut a real \`v*\` tag."
              echo ""
              echo "Inspect the branch: \`git fetch origin gh-pages-dryrun && git checkout gh-pages-dryrun\`"
            else
              echo "### ✅ Flatpak remote published"
              echo ""
              echo "OSTree branch: \`${{ steps.mode.outputs.ostree }}\` · Pages branch: \`gh-pages\`"
              echo ""
              echo "Remote file: ${PAGES_URL}/amethyst.flatpakrepo"
              echo "Repo URL:    ${PAGES_URL}/repo/"
              echo ""
              echo "One-command install:"
              echo '```'
              echo "flatpak install --user ${PAGES_URL}/amethyst.flatpakref"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
